<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <style>
        body {
            background-color: black;
            color: white;
        }
    </style>
    <title>Rock Paper Scissors</title>
</head>
<body>
    <h1>Rock, Paper, Scissors</h1>
    <button class="rockButton">Rock</button>
    <button class="paperButton">Paper</button>
    <button class="scissorsButton">Scissors</button>
    <div class="scoreDiv">
        <h2 class="roundOutcome"></h2>
        <h2>Player Score: <span id="playerScore">0</span></h2>
        <h2>Computer Score: <span id="computerScore">0</span></h2>
    </div>
</body>
</html>
